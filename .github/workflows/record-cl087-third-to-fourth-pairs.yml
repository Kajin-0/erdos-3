name: Record CL-087 third-to-fourth pair theorem

on:
  push:
    branches:
      - main
    paths:
      - src/patch_cl087_third_to_fourth_pairs.py
      - .github/workflows/record-cl087-third-to-fourth-pairs.yml

permissions:
  contents: write

jobs:
  record:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Patch authoritative documents
        run: |
          python3 -m py_compile src/patch_cl087_third_to_fourth_pairs.py
          python3 src/patch_cl087_third_to_fourth_pairs.py
      - name: Commit update
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs/certainty-ledger.md docs/current-proof-program.md docs/research-decision-history.md
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "Record CL-087 R3-to-F4 pair theorem [skip ci]"
          for attempt in 1 2 3; do
            git fetch origin main
            git rebase origin/main
            if git push origin HEAD:main; then exit 0; fi
            sleep $((attempt * 2))
          done
          exit 1
