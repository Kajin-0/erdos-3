name: Pair-resource R3-to-F4 diagnostic

on:
  push:
    branches:
      - main
    paths:
      - src/probe_pair_resource_third_to_fourth.py
      - src/summarize_pair_resource_third_to_fourth.py
      - src/verify_pair_resource_third_to_fourth.py
      - .github/workflows/pair-resource-third-to-fourth-probe.yml

permissions:
  contents: write

jobs:
  probe:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PROBE_SCHEMA: pair_resource_third_to_fourth_probe_v1
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run R3-to-F4 pair-resource diagnostic
        run: |
          set +e
          python3 -m py_compile \
            src/probe_pair_resource_third_to_fourth.py \
            src/summarize_pair_resource_third_to_fourth.py \
            src/verify_pair_resource_third_to_fourth.py
          compile_status=$?
          probe_status=not_run
          summary_status=not_run
          verifier_status=not_run
          : > /tmp/pair_resource_third_to_fourth.err
          if [[ "$compile_status" == "0" ]]; then
            python3 src/run_exact_python.py \
              src/probe_pair_resource_third_to_fourth.py \
              > data/pair_resource_third_to_fourth_probe.json \
              2> /tmp/pair_resource_third_to_fourth.err
            probe_status=$?
            if [[ "$probe_status" == "0" ]]; then
              python3 src/summarize_pair_resource_third_to_fourth.py \
                data/pair_resource_third_to_fourth_probe.json \
                data/pair_resource_third_to_fourth_summary.txt \
                2>> /tmp/pair_resource_third_to_fourth.err
              summary_status=$?
              python3 src/run_exact_python.py \
                src/verify_pair_resource_third_to_fourth.py \
                data/pair_resource_third_to_fourth_certificate_2026-07-14.txt \
                2>> /tmp/pair_resource_third_to_fourth.err
              verifier_status=$?
            else
              rm -f data/pair_resource_third_to_fourth_probe.json
              rm -f data/pair_resource_third_to_fourth_summary.txt
              rm -f data/pair_resource_third_to_fourth_certificate_2026-07-14.txt
            fi
          fi
          {
            echo "schema=$PROBE_SCHEMA"
            echo "compile_exit_status=$compile_status"
            echo "probe_exit_status=$probe_status"
            echo "summary_exit_status=$summary_status"
            echo "verifier_exit_status=$verifier_status"
            echo "commit=${GITHUB_SHA}"
            echo "--- stderr ---"
            cat /tmp/pair_resource_third_to_fourth.err
          } > data/pair_resource_third_to_fourth_status.txt
          exit 0
      - name: Commit deterministic result
        if: always()
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/pair_resource_third_to_fourth_status.txt
          git add -A data/pair_resource_third_to_fourth_probe.json
          git add -A data/pair_resource_third_to_fourth_summary.txt
          git add -A data/pair_resource_third_to_fourth_certificate_2026-07-14.txt
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "Record R3-to-F4 pair-resource certificate [skip ci]"
          for attempt in 1 2 3; do
            git fetch origin main
            git rebase origin/main
            if git push origin HEAD:main; then exit 0; fi
            sleep $((attempt * 2))
          done
          exit 1
