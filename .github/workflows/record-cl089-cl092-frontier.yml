name: Record corrected proof frontier

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - src/patch_cl089_cl092_frontier.py
      - .github/workflows/record-cl089-cl092-frontier.yml

permissions:
  contents: write

concurrency:
  group: probe-result-writers-main
  cancel-in-progress: false

jobs:
  record:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Patch and verify canonical documentation
        shell: bash
        run: |
          set +e
          stderr_file="${RUNNER_TEMP}/cl089_cl092_frontier.err"
          : > "$stderr_file"

          python3 -W error -m py_compile src/patch_cl089_cl092_frontier.py \
            2>"$stderr_file"
          compile_status=$?
          patch_status=not_run
          idempotence_status=not_run

          if [[ "$compile_status" == "0" ]]; then
            python3 src/patch_cl089_cl092_frontier.py \
              2>>"$stderr_file"
            patch_status=$?
          fi

          if [[ "$patch_status" == "0" ]]; then
            sha256sum \
              README.md \
              docs/certainty-ledger.md \
              docs/current-proof-program.md \
              docs/research-decision-history.md \
              > "${RUNNER_TEMP}/cl089_cl092_first.sha256"
            python3 src/patch_cl089_cl092_frontier.py \
              2>>"$stderr_file"
            second_status=$?
            if [[ "$second_status" == "0" ]]; then
              sha256sum \
                README.md \
                docs/certainty-ledger.md \
                docs/current-proof-program.md \
                docs/research-decision-history.md \
                > "${RUNNER_TEMP}/cl089_cl092_second.sha256"
              cmp \
                "${RUNNER_TEMP}/cl089_cl092_first.sha256" \
                "${RUNNER_TEMP}/cl089_cl092_second.sha256" \
                2>>"$stderr_file"
              idempotence_status=$?
            else
              idempotence_status=$second_status
            fi
          fi

          {
            echo "schema=cl089_cl092_frontier_status_v3"
            echo "compile_exit_status=$compile_status"
            echo "patch_exit_status=$patch_status"
            echo "idempotence_exit_status=$idempotence_status"
            echo "source_commit=${GITHUB_SHA}"
            echo "source_ref=${GITHUB_REF}"
            echo "workflow_run_id=${GITHUB_RUN_ID}"
            echo "workflow_run_attempt=${GITHUB_RUN_ATTEMPT}"
            echo "--- stderr ---"
            cat "$stderr_file"
          } > data/cl089_cl092_frontier_status.txt
          exit 0

      - name: Upload documentation diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cl089-cl092-frontier-${{ github.run_id }}-${{ github.run_attempt }}
          retention-days: 30
          if-no-files-found: ignore
          path: |
            data/cl089_cl092_frontier_status.txt
            ${{ runner.temp }}/cl089_cl092_frontier.err
            ${{ runner.temp }}/cl089_cl092_first.sha256
            ${{ runner.temp }}/cl089_cl092_second.sha256

      - name: Commit corrected frontier or failure status
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          bash src/stage_optional_probe_outputs.sh \
            data/cl089_cl092_frontier_status.txt

          if grep -Fxq 'compile_exit_status=0' data/cl089_cl092_frontier_status.txt && \
             grep -Fxq 'patch_exit_status=0' data/cl089_cl092_frontier_status.txt && \
             grep -Fxq 'idempotence_exit_status=0' data/cl089_cl092_frontier_status.txt; then
            git add -- \
              README.md \
              docs/certainty-ledger.md \
              docs/current-proof-program.md \
              docs/research-decision-history.md
          fi

          if git diff --cached --quiet; then
            exit 0
          fi

          git commit -m "Record corrected pair-activation frontier [skip ci]"
          git fetch origin main
          if ! git diff --quiet "$GITHUB_SHA" origin/main -- \
              src/patch_cl089_cl092_frontier.py \
              .github/workflows/record-cl089-cl092-frontier.yml; then
            echo "error: corrected-frontier patch source changed; refusing stale documentation" >&2
            exit 1
          fi
          if ! git rebase origin/main; then
            if ! git rebase --abort; then
              echo "warning: failed to abort corrected-frontier rebase" >&2
            fi
            exit 1
          fi
          git push origin HEAD:main

      - name: Report original documentation failure
        if: always()
        shell: bash
        run: bash src/assert_probe_status.sh data/cl089_cl092_frontier_status.txt
