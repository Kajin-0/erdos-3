name: Fourth-to-fifth policy sensitivity

on:
  push:
    branches:
      - main
    paths:
      - src/probe_fourth_to_fifth_policy_sensitivity.py
      - .github/workflows/fourth-to-fifth-policy-sensitivity.yml

permissions:
  contents: write

jobs:
  probe:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run exact policy-sensitivity probe
        shell: bash
        run: |
          set +e
          python3 src/run_exact_python.py \
            src/probe_fourth_to_fifth_policy_sensitivity.py \
            > /tmp/fourth_to_fifth_policy_sensitivity.json \
            2> /tmp/fourth_to_fifth_policy_sensitivity.err
          status=$?
          {
            echo "exit_status=$status"
            echo "commit=${GITHUB_SHA}"
            echo "--- stderr ---"
            cat /tmp/fourth_to_fifth_policy_sensitivity.err
          } > data/fourth_to_fifth_policy_sensitivity_status.txt
          if [[ "$status" == "0" ]]; then
            cp /tmp/fourth_to_fifth_policy_sensitivity.json \
              data/fourth_to_fifth_policy_sensitivity_probe.json
          else
            rm -f data/fourth_to_fifth_policy_sensitivity_probe.json
          fi
          exit 0

      - name: Commit deterministic probe result
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ ! -f data/fourth_to_fifth_policy_sensitivity_status.txt ]]; then
            {
              echo "phase=workflow_failed_before_probe_status"
              echo "commit=${GITHUB_SHA}"
            } > data/fourth_to_fifth_policy_sensitivity_status.txt
          fi
          git add data/fourth_to_fifth_policy_sensitivity_status.txt
          git add -A data/fourth_to_fifth_policy_sensitivity_probe.json
          if git diff --cached --quiet; then
            echo "No policy-sensitivity output change"
            exit 0
          fi
          git commit -m "Record fourth-to-fifth policy sensitivity [skip ci]"
          for attempt in 1 2 3; do
            git fetch origin main
            git rebase origin/main
            if git push origin HEAD:main; then
              exit 0
            fi
            sleep $((attempt * 2))
          done
          echo "error: failed to push after rebasing and three attempts" >&2
          exit 1
