name: S7 heavy moment-depth

on:
  pull_request:
    paths:
      - '.github/workflows/s7-heavy-moment-depth.yml'
      - 'src/probe_s7_heavy_moment_depth_profile.py'
      - 'src/probe_s7_direct_pair_discharge.py'
      - 'src/probe_s7_hole_support_closure.py'
      - 'src/probe_terminal_pair_payment_frontier_v2.py'
      - 'src/probe_sponsor_pair_transport_frontier.py'
      - 'src/probe_residual_sponsor_backbone_split.py'
      - 'src/export_s7_full_saturation_map.cpp'
      - 'src/verify_retained_provenance_second_generation.py'
      - 'src/verify_retained_provenance_scale_profile.py'
      - 'src/probe_third_generation_recursive_frontier.py'
      - 'src/certified_contaminated_states.py'

permissions:
  contents: read

jobs:
  exact-s7-heavy-moment-depth:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Compile exact probes
        run: |
          python3 -m py_compile \
            src/probe_terminal_pair_payment_frontier_v2.py \
            src/probe_s7_direct_pair_discharge.py \
            src/probe_s7_heavy_moment_depth_profile.py
          g++ -O3 -std=c++17 \
            src/export_s7_full_saturation_map.cpp \
            -o export_s7_full_saturation_map

      - name: Build exact source frontier
        run: |
          python3 src/run_exact_python.py \
            src/probe_terminal_pair_payment_frontier_v2.py \
            --include-rows \
            > terminal_pair_payment_frontier_v2.json

      - name: Build full S7 saturation map
        run: |
          ./export_s7_full_saturation_map \
            > s7_full_saturation_map.tsv \
            2> s7_full_saturation_map_status.txt

      - name: Profile heavy moment-depth bridge
        run: |
          python3 src/probe_s7_heavy_moment_depth_profile.py \
            terminal_pair_payment_frontier_v2.json \
            s7_full_saturation_map.tsv \
            s7_heavy_moment_depth_profile.json \
            > s7_heavy_moment_depth_profile_stdout.json

      - name: Upload exact profile
        uses: actions/upload-artifact@v4
        with:
          name: s7-heavy-moment-depth-${{ github.run_id }}-${{ github.run_attempt }}
          retention-days: 30
          if-no-files-found: error
          path: |
            s7_full_saturation_map_status.txt
            s7_heavy_moment_depth_profile.json
            s7_heavy_moment_depth_profile_stdout.json
