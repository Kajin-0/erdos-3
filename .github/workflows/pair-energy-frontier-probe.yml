name: Pair-energy frontier probe

on:
  push:
    branches:
      - main
    paths:
      - src/probe_pair_energy_frontier.py
      - src/summarize_pair_energy_frontier.py
      - .github/workflows/pair-energy-frontier-probe.yml

permissions:
  contents: write

jobs:
  probe:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run pair-energy frontier test
        run: |
          set +e
          python3 -m py_compile src/probe_pair_energy_frontier.py src/summarize_pair_energy_frontier.py
          compile_status=$?
          probe_status=not_run
          summary_status=not_run
          : > /tmp/pair_energy_frontier.err
          if [[ "$compile_status" == "0" ]]; then
            python3 src/run_exact_python.py src/probe_pair_energy_frontier.py \
              > data/pair_energy_frontier_probe.json \
              2> /tmp/pair_energy_frontier.err
            probe_status=$?
            if [[ "$probe_status" == "0" ]]; then
              python3 src/summarize_pair_energy_frontier.py \
                data/pair_energy_frontier_probe.json \
                data/pair_energy_frontier_summary.txt \
                2>> /tmp/pair_energy_frontier.err
              summary_status=$?
            else
              rm -f data/pair_energy_frontier_probe.json data/pair_energy_frontier_summary.txt
            fi
          fi
          {
            echo "compile_exit_status=$compile_status"
            echo "probe_exit_status=$probe_status"
            echo "summary_exit_status=$summary_status"
            echo "commit=${GITHUB_SHA}"
            echo "--- stderr ---"
            cat /tmp/pair_energy_frontier.err
          } > data/pair_energy_frontier_status.txt
          exit 0
      - name: Commit deterministic result
        if: always()
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/pair_energy_frontier_status.txt
          git add -A data/pair_energy_frontier_probe.json
          git add -A data/pair_energy_frontier_summary.txt
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "Record pair-energy frontier probe [skip ci]"
          for attempt in 1 2 3; do
            git fetch origin main
            git rebase origin/main
            if git push origin HEAD:main; then exit 0; fi
            sleep $((attempt * 2))
          done
          exit 1
