name: Terminal pair payment v2 check

on:
  pull_request:
    paths:
      - '.github/workflows/terminal-pair-payment-v2-check.yml'
      - 'src/probe_terminal_pair_payment_frontier_v2.py'
      - 'src/probe_sponsor_pair_transport_frontier.py'
      - 'src/probe_residual_sponsor_backbone_split.py'
      - 'src/probe_s7_affine_owner_incidence_graph.py'
      - 'src/probe_s7_terminal_current_branch_absorption.py'
      - 'src/probe_s7_hole_support_closure.py'
      - 'src/probe_s7_support_transition_rank.py'
      - 'src/probe_s7_support_rewrite_potential.py'
      - 'src/probe_s7_completion_step_light_heavy.py'
      - 'src/probe_s7_completion_step_terminal_split.py'
      - 'src/probe_s7_capacity_aware_terminal_transfer.py'
      - 'src/probe_s7_direct_pair_discharge.py'
      - 'src/probe_s7_direct_recursive_heavy_frontier.py'
      - 'src/probe_s7_direct_horizontal_chain_packing.py'
      - 'src/probe_s7_direct_fractional_chain_flow.py'
      - 'src/probe_s7_direct_gap_triangular_chain_flow.py'
      - 'src/probe_s7_lineage_gap_moment_contraction.py'
      - 'src/probe_s7_direct_offdiagonal_cross_flow.py'
      - 'src/probe_s7_direct_alternate_route_flow.py'
      - 'src/verify_s7_direct_alternate_route_no_go.py'
      - 'src/probe_s7_alternate_cut_primary_repair.py'
      - 'src/s7_direct_chain_instance.py'
      - 'src/probe_s7_heavy_state_reference_reserve.py'
      - 'src/probe_s7_star_rectangle_first_appearance.py'
      - 'src/verify_sponsor_pair_transport_small_box.py'
      - 'src/verify_canonical_hole_witness_pair_small_box.py'
      - 'src/verify_completion_step_fiber_light_heavy.py'
      - 'src/export_s7_terminal_completion_requests.py'
      - 'src/export_s7_incremental_support_target_requests.py'
      - 'src/export_s7_full_saturation_map.cpp'
      - 'src/classify_s7_terminal_completion_saturation.cpp'
      - 'src/summarize_s7_edge_unresolved_completion_saturation.py'
      - 'src/summarize_s7_hole_support_first_appearance.py'
      - 'src/summarize_s7_new_hole_support_transport.py'
      - 'src/summarize_s7_incremental_support_target_payment.py'
      - 'src/verify_retained_provenance_second_generation.py'
      - 'src/verify_retained_provenance_scale_profile.py'
      - 'src/probe_third_generation_recursive_frontier.py'
      - 'src/certified_contaminated_states.py'

permissions:
  contents: read

jobs:
  exact-terminal-payment:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Compile terminal-payment sources
        run: |
          python3 -m py_compile \
            src/probe_terminal_pair_payment_frontier_v2.py \
            src/probe_s7_affine_owner_incidence_graph.py \
            src/probe_s7_terminal_current_branch_absorption.py \
            src/probe_s7_hole_support_closure.py \
            src/probe_s7_support_transition_rank.py \
            src/probe_s7_support_rewrite_potential.py \
            src/probe_s7_completion_step_light_heavy.py \
            src/probe_s7_completion_step_terminal_split.py \
            src/probe_s7_capacity_aware_terminal_transfer.py \
            src/probe_s7_direct_pair_discharge.py \
            src/probe_s7_direct_recursive_heavy_frontier.py \
            src/probe_s7_direct_horizontal_chain_packing.py \
            src/probe_s7_direct_fractional_chain_flow.py \
            src/probe_s7_direct_gap_triangular_chain_flow.py \
            src/probe_s7_lineage_gap_moment_contraction.py \
            src/probe_s7_direct_offdiagonal_cross_flow.py \
            src/probe_s7_direct_alternate_route_flow.py \
            src/verify_s7_direct_alternate_route_no_go.py \
            src/probe_s7_alternate_cut_primary_repair.py \
            src/s7_direct_chain_instance.py \
            src/probe_s7_heavy_state_reference_reserve.py \
            src/probe_s7_star_rectangle_first_appearance.py \
            src/verify_sponsor_pair_transport_small_box.py \
            src/verify_canonical_hole_witness_pair_small_box.py \
            src/verify_completion_step_fiber_light_heavy.py \
            src/export_s7_terminal_completion_requests.py \
            src/export_s7_incremental_support_target_requests.py \
            src/summarize_s7_edge_unresolved_completion_saturation.py \
            src/summarize_s7_hole_support_first_appearance.py \
            src/summarize_s7_new_hole_support_transport.py \
            src/summarize_s7_incremental_support_target_payment.py
          g++ -O3 -std=c++17 \
            src/classify_s7_terminal_completion_saturation.cpp \
            -o classify_s7_terminal_completion_saturation
          g++ -O3 -std=c++17 \
            src/export_s7_full_saturation_map.cpp \
            -o export_s7_full_saturation_map

      - name: Run independent small-box verifiers
        run: |
          python3 src/verify_sponsor_pair_transport_small_box.py
          python3 src/verify_canonical_hole_witness_pair_small_box.py
          python3 src/verify_completion_step_fiber_light_heavy.py

      - name: Run terminal-payment frontier probe
        run: |
          python3 src/run_exact_python.py \
            src/probe_terminal_pair_payment_frontier_v2.py \
            --include-rows \
            > terminal_pair_payment_frontier_v2.json
          python3 src/probe_s7_affine_owner_incidence_graph.py \
            s7_affine_owner_incidence_graph.json \
            > s7_affine_owner_incidence_graph_stdout.json
          python3 src/probe_s7_terminal_current_branch_absorption.py \
            s7_terminal_current_branch_absorption.json \
            > s7_terminal_current_branch_absorption_stdout.json

      - name: Classify edge-unresolved S7 completions
        run: |
          python3 src/export_s7_terminal_completion_requests.py \
            terminal_pair_payment_frontier_v2.json \
            s7_terminal_completion_requests.txt
          ./classify_s7_terminal_completion_saturation \
            s7_terminal_completion_requests.txt \
            s7_terminal_completion_classification.tsv
          python3 src/summarize_s7_edge_unresolved_completion_saturation.py \
            terminal_pair_payment_frontier_v2.json \
            s7_terminal_completion_classification.tsv \
            s7_edge_unresolved_completion_saturation_summary.json \
            > s7_edge_unresolved_completion_saturation_stdout.json
          python3 src/probe_s7_completion_step_light_heavy.py \
            terminal_pair_payment_frontier_v2.json \
            s7_terminal_completion_classification.tsv \
            s7_completion_step_light_heavy_profile.json \
            > s7_completion_step_light_heavy_stdout.json
          python3 src/probe_s7_completion_step_terminal_split.py \
            terminal_pair_payment_frontier_v2.json \
            s7_terminal_completion_classification.tsv \
            s7_completion_step_terminal_split.json \
            > s7_completion_step_terminal_split_stdout.json
          python3 src/probe_s7_capacity_aware_terminal_transfer.py \
            terminal_pair_payment_frontier_v2.json \
            s7_terminal_completion_classification.tsv \
            s7_capacity_aware_terminal_transfer.json \
            > s7_capacity_aware_terminal_transfer_stdout.json
          python3 src/probe_s7_heavy_state_reference_reserve.py \
            terminal_pair_payment_frontier_v2.json \
            s7_terminal_completion_classification.tsv \
            s7_heavy_state_reference_reserve_profile.json \
            > s7_heavy_state_reference_reserve_stdout.json
          python3 src/probe_s7_star_rectangle_first_appearance.py \
            terminal_pair_payment_frontier_v2.json \
            s7_terminal_completion_classification.tsv \
            s7_star_rectangle_first_appearance_profile.json \
            > s7_star_rectangle_first_appearance_stdout.json
          python3 src/summarize_s7_hole_support_first_appearance.py \
            terminal_pair_payment_frontier_v2.json \
            s7_terminal_completion_classification.tsv \
            s7_hole_support_first_appearance_profile.json \
            > s7_hole_support_first_appearance_stdout.json
          python3 src/summarize_s7_new_hole_support_transport.py \
            terminal_pair_payment_frontier_v2.json \
            s7_terminal_completion_classification.tsv \
            s7_new_hole_support_transport_profile.json \
            > s7_new_hole_support_transport_stdout.json
          python3 src/export_s7_incremental_support_target_requests.py \
            terminal_pair_payment_frontier_v2.json \
            s7_terminal_completion_classification.tsv \
            s7_incremental_support_completion_requests.txt \
            s7_incremental_support_targets.json \
            > s7_incremental_support_targets_stdout.json
          ./classify_s7_terminal_completion_saturation \
            s7_incremental_support_completion_requests.txt \
            s7_incremental_support_completion_classification.tsv
          python3 src/summarize_s7_incremental_support_target_payment.py \
            s7_incremental_support_targets.json \
            s7_incremental_support_completion_classification.tsv \
            terminal_pair_payment_frontier_v2.json \
            s7_terminal_completion_classification.tsv \
            s7_incremental_support_target_payment_summary.json \
            > s7_incremental_support_target_payment_stdout.json

      - name: Run fixed-frontier support closure
        run: |
          ./export_s7_full_saturation_map \
            > s7_full_saturation_map.tsv \
            2> s7_full_saturation_map_status.txt
          python3 src/probe_s7_direct_pair_discharge.py \
            terminal_pair_payment_frontier_v2.json \
            s7_full_saturation_map.tsv \
            s7_direct_pair_discharge.json \
            > s7_direct_pair_discharge_stdout.json
          python3 src/probe_s7_direct_recursive_heavy_frontier.py \
            terminal_pair_payment_frontier_v2.json \
            s7_full_saturation_map.tsv \
            s7_direct_recursive_heavy_frontier.json \
            > s7_direct_recursive_heavy_frontier_stdout.json
          python3 src/probe_s7_direct_horizontal_chain_packing.py \
            terminal_pair_payment_frontier_v2.json \
            s7_full_saturation_map.tsv \
            s7_direct_horizontal_chain_packing.json \
            > s7_direct_horizontal_chain_packing_stdout.json
          python3 src/probe_s7_direct_gap_triangular_chain_flow.py \
            terminal_pair_payment_frontier_v2.json \
            s7_full_saturation_map.tsv \
            s7_direct_gap_triangular_chain_flow.json \
            > s7_direct_gap_triangular_chain_flow_stdout.json
          python3 src/probe_s7_lineage_gap_moment_contraction.py \
            terminal_pair_payment_frontier_v2.json \
            s7_full_saturation_map.tsv \
            s7_lineage_gap_moment_contraction.json \
            > s7_lineage_gap_moment_contraction_stdout.json
          python3 src/probe_s7_direct_offdiagonal_cross_flow.py \
            terminal_pair_payment_frontier_v2.json \
            s7_full_saturation_map.tsv \
            s7_direct_offdiagonal_cross_flow.json \
            > s7_direct_offdiagonal_cross_flow_stdout.json
          python3 src/verify_s7_direct_alternate_route_no_go.py \
            terminal_pair_payment_frontier_v2.json \
            s7_full_saturation_map.tsv \
            s7_direct_alternate_route_flow.json \
            > s7_direct_alternate_route_flow_stdout.json
          python3 src/probe_s7_alternate_cut_primary_repair.py \
            terminal_pair_payment_frontier_v2.json \
            s7_full_saturation_map.tsv \
            s7_alternate_cut_primary_repair.json \
            > s7_alternate_cut_primary_repair_stdout.json
          python3 src/probe_s7_hole_support_closure.py \
            terminal_pair_payment_frontier_v2.json \
            s7_full_saturation_map.tsv \
            s7_hole_support_closure.json \
            > s7_hole_support_closure_stdout.json
          python3 src/probe_s7_support_transition_rank.py \
            terminal_pair_payment_frontier_v2.json \
            s7_full_saturation_map.tsv \
            s7_support_transition_rank.json \
            > s7_support_transition_rank_stdout.json
          python3 src/probe_s7_support_rewrite_potential.py \
            terminal_pair_payment_frontier_v2.json \
            s7_full_saturation_map.tsv \
            s7_support_rewrite_potential.json \
            > s7_support_rewrite_potential_stdout.json

      - name: Upload terminal-payment frontier
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terminal-pair-payment-v2-${{ github.run_id }}-${{ github.run_attempt }}
          retention-days: 30
          if-no-files-found: error
          path: |
            terminal_pair_payment_frontier_v2.json
            s7_affine_owner_incidence_graph.json
            s7_affine_owner_incidence_graph_stdout.json
            s7_terminal_current_branch_absorption.json
            s7_terminal_current_branch_absorption_stdout.json
            s7_terminal_completion_requests.txt
            s7_terminal_completion_classification.tsv
            s7_edge_unresolved_completion_saturation_summary.json
            s7_edge_unresolved_completion_saturation_stdout.json
            s7_completion_step_light_heavy_profile.json
            s7_completion_step_light_heavy_stdout.json
            s7_completion_step_terminal_split.json
            s7_completion_step_terminal_split_stdout.json
            s7_capacity_aware_terminal_transfer.json
            s7_capacity_aware_terminal_transfer_stdout.json
            s7_heavy_state_reference_reserve_profile.json
            s7_heavy_state_reference_reserve_stdout.json
            s7_star_rectangle_first_appearance_profile.json
            s7_star_rectangle_first_appearance_stdout.json
            s7_hole_support_first_appearance_profile.json
            s7_hole_support_first_appearance_stdout.json
            s7_new_hole_support_transport_profile.json
            s7_new_hole_support_transport_stdout.json
            s7_incremental_support_completion_requests.txt
            s7_incremental_support_targets.json
            s7_incremental_support_targets_stdout.json
            s7_incremental_support_completion_classification.tsv
            s7_incremental_support_target_payment_summary.json
            s7_incremental_support_target_payment_stdout.json
            s7_full_saturation_map_status.txt
            s7_direct_pair_discharge.json
            s7_direct_pair_discharge_stdout.json
            s7_direct_recursive_heavy_frontier.json
            s7_direct_recursive_heavy_frontier_stdout.json
            s7_direct_horizontal_chain_packing.json
            s7_direct_horizontal_chain_packing_stdout.json
            s7_direct_gap_triangular_chain_flow.json
            s7_direct_gap_triangular_chain_flow_stdout.json
            s7_lineage_gap_moment_contraction.json
            s7_lineage_gap_moment_contraction_stdout.json
            s7_direct_offdiagonal_cross_flow.json
            s7_direct_offdiagonal_cross_flow_stdout.json
            s7_direct_alternate_route_flow.json
            s7_direct_alternate_route_flow_stdout.json
            s7_alternate_cut_primary_repair.json
            s7_alternate_cut_primary_repair_stdout.json
            s7_hole_support_closure.json
            s7_hole_support_closure_stdout.json
            s7_support_transition_rank.json
            s7_support_transition_rank_stdout.json
            s7_support_rewrite_potential.json
            s7_support_rewrite_potential_stdout.json
