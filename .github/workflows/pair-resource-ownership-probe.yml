name: Pair-resource ownership probe

on:
  push:
    branches:
      - main
    paths:
      - src/probe_pair_resource_ownership.py
      - src/summarize_pair_resource_ownership.py
      - src/verify_pair_resource_ownership.py
      - .github/workflows/pair-resource-ownership-probe.yml

permissions:
  contents: write

concurrency:
  group: probe-result-writers-main
  cancel-in-progress: false

jobs:
  probe:
    uses: ./.github/workflows/reusable-python-probe-recorder.yml
    with:
      schema: pair_resource_ownership_probe_v1
      probe_script: src/probe_pair_resource_ownership.py
      probe_output: data/pair_resource_ownership_probe.json
      summary_script: src/summarize_pair_resource_ownership.py
      summary_output: data/pair_resource_ownership_summary.txt
      status_output: data/pair_resource_ownership_status.txt
      verifier_script: src/verify_pair_resource_ownership.py
      certificate_output: data/pair_resource_ownership_certificate_2026-07-14.txt
      commit_message: Record pair-resource ownership certificate [skip ci]
