name: Affine root-pivot probe

on:
  push:
    branches:
      - main
    paths:
      - src/probe_affine_root_pivot.py
      - src/summarize_affine_root_pivot.py
      - .github/workflows/affine-root-pivot-probe.yml

permissions:
  contents: write

jobs:
  probe:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PROBE_SCHEMA: affine_root_pivot_probe_v1
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run affine pivot test
        run: |
          set +e
          python3 -m py_compile src/probe_affine_root_pivot.py src/summarize_affine_root_pivot.py
          compile_status=$?
          probe_status=not_run
          summary_status=not_run
          : > /tmp/affine_root_pivot.err
          if [[ "$compile_status" == "0" ]]; then
            python3 src/run_exact_python.py src/probe_affine_root_pivot.py \
              > data/affine_root_pivot_probe.json \
              2> /tmp/affine_root_pivot.err
            probe_status=$?
            if [[ "$probe_status" == "0" ]]; then
              python3 src/summarize_affine_root_pivot.py \
                data/affine_root_pivot_probe.json \
                data/affine_root_pivot_summary.txt \
                2>> /tmp/affine_root_pivot.err
              summary_status=$?
            else
              rm -f data/affine_root_pivot_probe.json data/affine_root_pivot_summary.txt
            fi
          fi
          {
            echo "schema=$PROBE_SCHEMA"
            echo "compile_exit_status=$compile_status"
            echo "probe_exit_status=$probe_status"
            echo "summary_exit_status=$summary_status"
            echo "commit=${GITHUB_SHA}"
            echo "--- stderr ---"
            cat /tmp/affine_root_pivot.err
          } > data/affine_root_pivot_status.txt
          exit 0

      - name: Commit deterministic result
        if: always()
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/affine_root_pivot_status.txt
          git add -A data/affine_root_pivot_probe.json
          git add -A data/affine_root_pivot_summary.txt
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Record affine root-pivot probe [skip ci]"
          for attempt in 1 2 3; do
            git fetch origin main
            git rebase origin/main
            if git push origin HEAD:main; then exit 0; fi
            sleep $((attempt * 2))
          done
          exit 1
