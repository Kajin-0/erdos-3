name: One-time scale-transfer documentation

# One-time trigger after the workflow became active on main.
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - src/patch_cl089_cl092_frontier.py
      - src/patch_cl089_cl096_collision_frontier.py
      - src/patch_cl097_cl100_scale_transfer.py
      - .github/workflows/one-time-scale-transfer-docs.yml

permissions:
  contents: write

concurrency:
  group: one-time-scale-transfer-docs
  cancel-in-progress: false

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply canonical patch twice
        shell: bash
        run: |
          set +e
          err="${RUNNER_TEMP}/scale_transfer_docs.err"
          : > "$err"
          python3 -m py_compile \
            src/patch_cl089_cl092_frontier.py \
            src/patch_cl089_cl096_collision_frontier.py \
            src/patch_cl097_cl100_scale_transfer.py \
            2>"$err"
          compile_status=$?
          patch_status=not_run
          idempotence_status=not_run
          if [[ "$compile_status" == "0" ]]; then
            python3 src/patch_cl097_cl100_scale_transfer.py 2>>"$err"
            patch_status=$?
          fi
          if [[ "$patch_status" == "0" ]]; then
            sha256sum README.md docs/certainty-ledger.md docs/current-proof-program.md docs/research-decision-history.md > "${RUNNER_TEMP}/first.sha"
            python3 src/patch_cl097_cl100_scale_transfer.py 2>>"$err"
            second_status=$?
            if [[ "$second_status" == "0" ]]; then
              sha256sum README.md docs/certainty-ledger.md docs/current-proof-program.md docs/research-decision-history.md > "${RUNNER_TEMP}/second.sha"
              cmp "${RUNNER_TEMP}/first.sha" "${RUNNER_TEMP}/second.sha" 2>>"$err"
              idempotence_status=$?
            else
              idempotence_status=$second_status
            fi
          fi
          {
            echo "schema=one_time_scale_transfer_docs_v1"
            echo "compile_exit_status=$compile_status"
            echo "patch_exit_status=$patch_status"
            echo "idempotence_exit_status=$idempotence_status"
            echo "source_commit=${GITHUB_SHA}"
            echo "workflow_run_id=${GITHUB_RUN_ID}"
            echo "--- stderr ---"
            cat "$err"
          } > data/one_time_scale_transfer_docs_status.txt
          exit 0

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: one-time-scale-transfer-docs-${{ github.run_id }}
          retention-days: 30
          if-no-files-found: ignore
          path: |
            data/one_time_scale_transfer_docs_status.txt
            ${{ runner.temp }}/scale_transfer_docs.err
            ${{ runner.temp }}/first.sha
            ${{ runner.temp }}/second.sha

      - name: Commit patched documentation
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          bash src/stage_optional_probe_outputs.sh data/one_time_scale_transfer_docs_status.txt
          if grep -Fxq 'compile_exit_status=0' data/one_time_scale_transfer_docs_status.txt && \
             grep -Fxq 'patch_exit_status=0' data/one_time_scale_transfer_docs_status.txt && \
             grep -Fxq 'idempotence_exit_status=0' data/one_time_scale_transfer_docs_status.txt; then
            git add -- README.md docs/certainty-ledger.md docs/current-proof-program.md docs/research-decision-history.md
          fi
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Record scale-critical transfer frontier [skip ci]"
          git fetch origin main
          if ! git diff --quiet "$GITHUB_SHA" origin/main -- \
              src/patch_cl089_cl092_frontier.py \
              src/patch_cl089_cl096_collision_frontier.py \
              src/patch_cl097_cl100_scale_transfer.py \
              .github/workflows/one-time-scale-transfer-docs.yml; then
            echo "error: documentation patch source changed" >&2
            exit 1
          fi
          if ! git rebase origin/main; then
            git rebase --abort || true
            exit 1
          fi
          git push origin HEAD:main

      - name: Report patch failure
        if: always()
        shell: bash
        run: bash src/assert_probe_status.sh data/one_time_scale_transfer_docs_status.txt
