name: Residual-sponsor backbone split probe

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - src/probe_residual_sponsor_backbone_split.py
      - src/summarize_residual_sponsor_backbone_split.py
      - src/verify_residual_sponsor_backbone_split.py
      - .github/workflows/residual-sponsor-backbone-split-probe.yml

permissions:
  contents: write

concurrency:
  group: probe-result-writers-main
  cancel-in-progress: false

jobs:
  probe:
    uses: ./.github/workflows/reusable-python-probe-recorder.yml
    with:
      schema: residual_sponsor_backbone_split_probe_v2
      probe_script: src/probe_residual_sponsor_backbone_split.py
      probe_output: data/residual_sponsor_backbone_split_probe.json
      summary_script: src/summarize_residual_sponsor_backbone_split.py
      summary_output: data/residual_sponsor_backbone_split_summary.txt
      status_output: data/residual_sponsor_backbone_split_status.txt
      verifier_script: src/verify_residual_sponsor_backbone_split.py
      certificate_output: data/residual_sponsor_backbone_split_certificate_2026-07-14.txt
      commit_message: Record certified residual-sponsor backbone split [skip ci]
