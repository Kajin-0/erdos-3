name: Affine pair-token frontier probe

on:
  push:
    branches:
      - main
    paths:
      - src/probe_affine_pair_token_frontier.py
      - src/summarize_affine_pair_token_frontier.py
      - .github/workflows/affine-pair-token-frontier-probe.yml

permissions:
  contents: write

concurrency:
  group: probe-result-writers-main
  cancel-in-progress: false

jobs:
  probe:
    uses: ./.github/workflows/reusable-python-probe-recorder.yml
    with:
      schema: affine_pair_token_frontier_probe_v1
      probe_script: src/probe_affine_pair_token_frontier.py
      probe_output: data/affine_pair_token_frontier_probe.json
      summary_script: src/summarize_affine_pair_token_frontier.py
      summary_output: data/affine_pair_token_frontier_summary.txt
      status_output: data/affine_pair_token_frontier_status.txt
      commit_message: Record affine pair-token frontier probe [skip ci]
