name: Reusable Python probe recorder

on:
  workflow_call:
    inputs:
      schema:
        required: true
        type: string
      probe_script:
        required: true
        type: string
      probe_output:
        required: true
        type: string
      summary_script:
        required: true
        type: string
      summary_output:
        required: true
        type: string
      status_output:
        required: true
        type: string
      commit_message:
        required: true
        type: string
      verifier_script:
        required: false
        default: ""
        type: string
      certificate_output:
        required: false
        default: ""
        type: string

permissions:
  contents: write

jobs:
  probe:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run probe atomically
        shell: bash
        env:
          PROBE_SCHEMA: ${{ inputs.schema }}
          PROBE_SCRIPT: ${{ inputs.probe_script }}
          PROBE_OUTPUT: ${{ inputs.probe_output }}
          SUMMARY_SCRIPT: ${{ inputs.summary_script }}
          SUMMARY_OUTPUT: ${{ inputs.summary_output }}
          STATUS_OUTPUT: ${{ inputs.status_output }}
          VERIFIER_SCRIPT: ${{ inputs.verifier_script }}
          CERTIFICATE_OUTPUT: ${{ inputs.certificate_output }}
        run: |
          set -euo pipefail
          stderr_file="${RUNNER_TEMP}/${PROBE_SCHEMA}.err"
          args=(
            "$PROBE_SCHEMA"
            "$STATUS_OUTPUT"
            "$stderr_file"
            "$PROBE_SCRIPT"
            "$PROBE_OUTPUT"
            "$SUMMARY_SCRIPT"
            "$SUMMARY_OUTPUT"
          )
          if [[ -n "$VERIFIER_SCRIPT" ]]; then
            args+=("$VERIFIER_SCRIPT" "$CERTIFICATE_OUTPUT")
          fi
          bash src/run_atomic_python_probe.sh "${args[@]}"

      - name: Upload diagnostic artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.schema }}-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: ignore
          retention-days: 30
          path: |
            ${{ inputs.status_output }}
            ${{ inputs.probe_output }}
            ${{ inputs.summary_output }}
            ${{ inputs.certificate_output }}
            ${{ runner.temp }}/${{ inputs.schema }}.err

      - name: Record deterministic result and diagnostics
        if: always()
        shell: bash
        env:
          COMMIT_MESSAGE: ${{ inputs.commit_message }}
          STATUS_OUTPUT: ${{ inputs.status_output }}
          PROBE_OUTPUT: ${{ inputs.probe_output }}
          SUMMARY_OUTPUT: ${{ inputs.summary_output }}
          CERTIFICATE_OUTPUT: ${{ inputs.certificate_output }}
        run: |
          set -euo pipefail
          optional=("$PROBE_OUTPUT" "$SUMMARY_OUTPUT")
          if [[ -n "$CERTIFICATE_OUTPUT" ]]; then
            optional+=("$CERTIFICATE_OUTPUT")
          fi
          bash src/commit_probe_outputs.sh \
            "$COMMIT_MESSAGE" \
            "$STATUS_OUTPUT" \
            "${optional[@]}"

      - name: Report original probe failure
        if: always()
        shell: bash
        run: bash src/assert_probe_status.sh "${{ inputs.status_output }}"
