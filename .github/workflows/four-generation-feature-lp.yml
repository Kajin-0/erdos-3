name: Four-generation feature LP

on:
  push:
    branches:
      - main
    paths:
      - src/probe_four_generation_feature_lp.py
      - src/probe_four_generation_integer_witness.py
      - .github/workflows/four-generation-feature-lp.yml

permissions:
  contents: write

jobs:
  solve:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Solve exact feature LP
        shell: bash
        run: |
          set +e
          echo "phase=started" > data/four_generation_feature_lp_status.txt
          echo "commit=${GITHUB_SHA}" >> data/four_generation_feature_lp_status.txt
          python3 src/run_exact_python.py \
            src/probe_four_generation_feature_lp.py \
            > /tmp/four_generation_feature_lp.json \
            2> /tmp/four_generation_feature_lp.err
          lp_status=$?
          witness_status=not_run
          : > /tmp/four_generation_integer_witness.err
          if [[ "$lp_status" == "0" ]]; then
            cp /tmp/four_generation_feature_lp.json \
              data/four_generation_feature_lp_probe.json
            python3 src/run_exact_python.py \
              src/probe_four_generation_integer_witness.py \
              > /tmp/four_generation_integer_witness.json \
              2> /tmp/four_generation_integer_witness.err
            witness_status=$?
            if [[ "$witness_status" == "0" ]]; then
              cp /tmp/four_generation_integer_witness.json \
                data/four_generation_integer_witness_probe.json
            else
              rm -f data/four_generation_integer_witness_probe.json
            fi
          else
            rm -f data/four_generation_feature_lp_probe.json
            rm -f data/four_generation_integer_witness_probe.json
          fi
          {
            echo "lp_exit_status=$lp_status"
            echo "witness_exit_status=$witness_status"
            echo "phase=completed"
            echo "--- LP stderr ---"
            cat /tmp/four_generation_feature_lp.err
            echo "--- witness stderr ---"
            cat /tmp/four_generation_integer_witness.err
          } >> data/four_generation_feature_lp_status.txt
          exit 0

      - name: Commit deterministic LP result
        if: always()
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ ! -f data/four_generation_feature_lp_status.txt ]]; then
            {
              echo "phase=workflow_failed_before_solver_status"
              echo "commit=${GITHUB_SHA}"
            } > data/four_generation_feature_lp_status.txt
          fi
          git add data/four_generation_feature_lp_status.txt
          git add -A data/four_generation_feature_lp_probe.json
          git add -A data/four_generation_integer_witness_probe.json
          if git diff --cached --quiet; then
            echo "No feature LP output change"
            exit 0
          fi
          git commit -m "Record four-generation feature LP result [skip ci]"
          git push