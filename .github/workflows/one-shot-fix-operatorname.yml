name: One-shot fix unsupported operatorname macro

on:
  push:
    branches:
      - agent/fix-unsupported-operatorname

permissions:
  contents: write

jobs:
  replace-macro:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Replace unsupported macro in Markdown
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import subprocess

          paths = subprocess.check_output(
              ["git", "ls-files", "*.md"], text=True
          ).splitlines()

          changed = []
          count = 0
          for name in paths:
              path = Path(name)
              text = path.read_text(encoding="utf-8")
              occurrences = text.count(r"\operatorname{")
              if not occurrences:
                  continue
              path.write_text(
                  text.replace(r"\operatorname{", r"\mathrm{"),
                  encoding="utf-8",
              )
              changed.append(name)
              count += occurrences

          print(f"Replaced {count} occurrence(s) across {len(changed)} file(s).")
          for name in changed:
              print(name)

          if count == 0:
              raise SystemExit("No unsupported operatorname macros found")
          PY

      - name: Commit exact substitutions
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- '*.md'
          git commit -m "Replace unsupported operatorname macro"
          git push
