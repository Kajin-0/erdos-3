name: Pair-energy frontier probe

on:
  push:
    branches:
      - main
    paths:
      - src/probe_pair_energy_frontier.py
      - src/summarize_pair_energy_frontier.py
      - src/verify_pair_energy_frontier.py
      - .github/workflows/pair-energy-frontier-probe.yml

permissions:
  contents: write

concurrency:
  group: probe-result-writers-main
  cancel-in-progress: false

jobs:
  probe:
    uses: ./.github/workflows/reusable-python-probe-recorder.yml
    with:
      schema: pair_energy_frontier_probe_v1
      probe_script: src/probe_pair_energy_frontier.py
      probe_output: data/pair_energy_frontier_probe.json
      summary_script: src/summarize_pair_energy_frontier.py
      summary_output: data/pair_energy_frontier_summary.txt
      status_output: data/pair_energy_frontier_status.txt
      verifier_script: src/verify_pair_energy_frontier.py
      certificate_output: data/pair_energy_frontier_certificate_2026-07-14.txt
      commit_message: Record pair-energy frontier certificate [skip ci]
