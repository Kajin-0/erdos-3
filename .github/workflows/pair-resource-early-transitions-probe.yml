name: Pair-resource early transitions probe

on:
  push:
    branches:
      - main
    paths:
      - src/probe_pair_resource_early_transitions.py
      - src/summarize_pair_resource_early_transitions.py
      - .github/workflows/pair-resource-early-transitions-probe.yml

permissions:
  contents: write

concurrency:
  group: probe-result-writers-main
  cancel-in-progress: false

jobs:
  probe:
    uses: ./.github/workflows/reusable-python-probe-recorder.yml
    with:
      schema: pair_resource_early_transitions_probe_v1
      probe_script: src/probe_pair_resource_early_transitions.py
      probe_output: data/pair_resource_early_transitions_probe.json
      summary_script: src/summarize_pair_resource_early_transitions.py
      summary_output: data/pair_resource_early_transitions_summary.txt
      status_output: data/pair_resource_early_transitions_status.txt
      commit_message: Record early pair-resource transitions [skip ci]
