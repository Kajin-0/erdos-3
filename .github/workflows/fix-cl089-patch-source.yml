name: Fix CL-089 documentation patch source

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - src/fix_cl089_patch_source.py
      - .github/workflows/fix-cl089-patch-source.yml

permissions:
  contents: write

concurrency:
  group: probe-result-writers-main
  cancel-in-progress: false

jobs:
  repair:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Repair and verify original patch source
        shell: bash
        run: |
          set +e
          err="${RUNNER_TEMP}/fix_cl089_patch_source.err"
          : > "$err"

          python3 -m py_compile src/fix_cl089_patch_source.py 2>"$err"
          compile_fixer_status=$?
          repair_status=not_run
          compile_patch_status=not_run
          first_patch_status=not_run
          second_patch_status=not_run
          idempotence_status=not_run

          if [[ "$compile_fixer_status" == "0" ]]; then
            python3 src/fix_cl089_patch_source.py 2>>"$err"
            repair_status=$?
          fi
          if [[ "$repair_status" == "0" ]]; then
            python3 -W error -m py_compile src/patch_cl089_cl092_frontier.py 2>>"$err"
            compile_patch_status=$?
          fi
          if [[ "$compile_patch_status" == "0" ]]; then
            python3 src/patch_cl089_cl092_frontier.py 2>>"$err"
            first_patch_status=$?
          fi
          if [[ "$first_patch_status" == "0" ]]; then
            sha256sum README.md docs/certainty-ledger.md docs/current-proof-program.md docs/research-decision-history.md > "${RUNNER_TEMP}/first.sha"
            python3 src/patch_cl089_cl092_frontier.py 2>>"$err"
            second_patch_status=$?
          fi
          if [[ "$second_patch_status" == "0" ]]; then
            sha256sum README.md docs/certainty-ledger.md docs/current-proof-program.md docs/research-decision-history.md > "${RUNNER_TEMP}/second.sha"
            cmp "${RUNNER_TEMP}/first.sha" "${RUNNER_TEMP}/second.sha" 2>>"$err"
            idempotence_status=$?
          fi

          {
            echo "schema=fix_cl089_patch_source_status_v1"
            echo "compile_fixer_exit_status=$compile_fixer_status"
            echo "repair_exit_status=$repair_status"
            echo "compile_patch_exit_status=$compile_patch_status"
            echo "first_patch_exit_status=$first_patch_status"
            echo "second_patch_exit_status=$second_patch_status"
            echo "idempotence_exit_status=$idempotence_status"
            echo "source_commit=${GITHUB_SHA}"
            echo "workflow_run_id=${GITHUB_RUN_ID}"
            echo "--- stderr ---"
            cat "$err"
          } > data/fix_cl089_patch_source_status.txt
          exit 0

      - name: Upload repair diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fix-cl089-patch-source-${{ github.run_id }}
          retention-days: 30
          if-no-files-found: ignore
          path: |
            data/fix_cl089_patch_source_status.txt
            ${{ runner.temp }}/fix_cl089_patch_source.err
            ${{ runner.temp }}/first.sha
            ${{ runner.temp }}/second.sha

      - name: Commit repaired source and canonical docs
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          bash src/stage_optional_probe_outputs.sh data/fix_cl089_patch_source_status.txt
          if grep -Fxq 'compile_fixer_exit_status=0' data/fix_cl089_patch_source_status.txt && \
             grep -Fxq 'repair_exit_status=0' data/fix_cl089_patch_source_status.txt && \
             grep -Fxq 'compile_patch_exit_status=0' data/fix_cl089_patch_source_status.txt && \
             grep -Fxq 'first_patch_exit_status=0' data/fix_cl089_patch_source_status.txt && \
             grep -Fxq 'second_patch_exit_status=0' data/fix_cl089_patch_source_status.txt && \
             grep -Fxq 'idempotence_exit_status=0' data/fix_cl089_patch_source_status.txt; then
            git add -- \
              src/patch_cl089_cl092_frontier.py \
              README.md \
              docs/certainty-ledger.md \
              docs/current-proof-program.md \
              docs/research-decision-history.md
          fi

          if git diff --cached --quiet; then
            exit 0
          fi

          git commit -m "Repair corrected-frontier documentation patch [skip ci]"
          git fetch origin main
          if ! git diff --quiet "$GITHUB_SHA" origin/main -- \
              src/fix_cl089_patch_source.py \
              .github/workflows/fix-cl089-patch-source.yml; then
            echo "error: source repair definition changed; refusing stale result" >&2
            exit 1
          fi
          if ! git rebase origin/main; then
            git rebase --abort || true
            exit 1
          fi
          git push origin HEAD:main

      - name: Report repair failure
        if: always()
        shell: bash
        run: |
          status=data/fix_cl089_patch_source_status.txt
          grep -Fxq 'compile_fixer_exit_status=0' "$status"
          grep -Fxq 'repair_exit_status=0' "$status"
          grep -Fxq 'compile_patch_exit_status=0' "$status"
          grep -Fxq 'first_patch_exit_status=0' "$status"
          grep -Fxq 'second_patch_exit_status=0' "$status"
          grep -Fxq 'idempotence_exit_status=0' "$status"
