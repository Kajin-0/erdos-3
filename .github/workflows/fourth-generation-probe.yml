name: Fourth-generation exact probe

on:
  push:
    branches:
      - main
    paths:
      - src/verify_fourth_generation_potential_frontier.py
      - src/patch_certainty_ledger_cl077.py
      - data/fourth_generation_potential_frontier_certificate_2026-07-13.txt
      - .github/workflows/fourth-generation-probe.yml

permissions:
  contents: write

jobs:
  probe:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify fourth-generation certificate and update ledger
        shell: bash
        run: |
          set +e
          python3 src/run_exact_python.py \
            src/verify_fourth_generation_potential_frontier.py \
            /tmp/fourth_generation_certificate.txt \
            > /tmp/fourth_generation_verifier.stdout \
            2> /tmp/fourth_generation_verifier.err
          verifier_status=$?
          patch_status=not_run
          if [[ "$verifier_status" == "0" ]]; then
            cmp data/fourth_generation_potential_frontier_certificate_2026-07-13.txt \
              /tmp/fourth_generation_certificate.txt
            verifier_status=$?
          fi
          if [[ "$verifier_status" == "0" ]]; then
            python3 src/patch_certainty_ledger_cl077.py \
              2> /tmp/certainty_ledger_patch.err
            patch_status=$?
          else
            : > /tmp/certainty_ledger_patch.err
          fi
          {
            echo "verifier_exit_status=$verifier_status"
            echo "patch_exit_status=$patch_status"
            echo "commit=${GITHUB_SHA}"
            echo "--- verifier stderr ---"
            cat /tmp/fourth_generation_verifier.err
            echo "--- patch stderr ---"
            cat /tmp/certainty_ledger_patch.err
          } > data/fourth_generation_probe_status.txt
          exit 0

      - name: Commit deterministic theorem state
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/fourth_generation_probe_status.txt
          git add docs/certainty-ledger.md
          if git diff --cached --quiet; then
            echo "No fourth-generation theorem state change"
            exit 0
          fi
          git commit -m "Record fourth-generation provenance-reserve theorem [skip ci]"
          git push
