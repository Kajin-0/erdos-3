name: Verify first-frontier terminal correction

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - src/verify_first_frontier_terminal_correction.py
      - src/summarize_first_frontier_terminal_correction_certificate.py
      - .github/workflows/verify-first-frontier-terminal-correction.yml

permissions:
  contents: write

concurrency:
  group: probe-result-writers-main
  cancel-in-progress: false

jobs:
  verify:
    uses: ./.github/workflows/reusable-python-probe-recorder.yml
    with:
      schema: first_frontier_terminal_correction_certificate_v1
      probe_script: src/verify_first_frontier_terminal_correction.py
      probe_output: data/first_frontier_terminal_correction_certificate.json
      summary_script: src/summarize_first_frontier_terminal_correction_certificate.py
      summary_output: data/first_frontier_terminal_correction_certificate.txt
      status_output: data/first_frontier_terminal_correction_verifier_status.txt
      commit_message: Certify first-frontier terminal correction [skip ci]
