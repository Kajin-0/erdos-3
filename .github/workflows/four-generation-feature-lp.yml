name: Four-generation feature LP

on:
  push:
    branches:
      - main
    paths:
      - src/probe_four_generation_feature_lp.py
      - .github/workflows/four-generation-feature-lp.yml

permissions:
  contents: write

jobs:
  solve:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Solve exact feature LP
        shell: bash
        run: |
          set +e
          python3 src/run_exact_python.py \
            src/probe_four_generation_feature_lp.py \
            > /tmp/four_generation_feature_lp.json \
            2> /tmp/four_generation_feature_lp.err
          status=$?
          {
            echo "exit_status=$status"
            echo "commit=${GITHUB_SHA}"
            echo "--- stderr ---"
            cat /tmp/four_generation_feature_lp.err
          } > data/four_generation_feature_lp_status.txt
          if [[ "$status" == "0" ]]; then
            cp /tmp/four_generation_feature_lp.json \
              data/four_generation_feature_lp_probe.json
          else
            rm -f data/four_generation_feature_lp_probe.json
          fi
          exit 0

      - name: Commit deterministic LP result
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/four_generation_feature_lp_status.txt
          git add -A data/four_generation_feature_lp_probe.json
          if git diff --cached --quiet; then
            echo "No feature LP output change"
            exit 0
          fi
          git commit -m "Record four-generation feature LP result [skip ci]"
          git push
