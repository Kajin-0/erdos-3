name: Root-lineage transfer classification probe

on:
  push:
    branches:
      - main
    paths:
      - src/probe_root_lineage_transfer_classification.py
      - src/summarize_root_lineage_transfer_classification.py
      - src/verify_root_lineage_transfer_classification.py
      - .github/workflows/root-lineage-transfer-classification-probe.yml

permissions:
  contents: write

concurrency:
  group: probe-result-writers-main
  cancel-in-progress: false

jobs:
  classify:
    uses: ./.github/workflows/reusable-python-probe-recorder.yml
    with:
      schema: root_lineage_transfer_classification_probe_v1
      probe_script: src/probe_root_lineage_transfer_classification.py
      probe_output: data/root_lineage_transfer_classification_probe.json
      summary_script: src/summarize_root_lineage_transfer_classification.py
      summary_output: data/root_lineage_transfer_classification_summary.txt
      status_output: data/root_lineage_transfer_classification_status.txt
      verifier_script: src/verify_root_lineage_transfer_classification.py
      certificate_output: data/root_lineage_transfer_classification_certificate_2026-07-14.txt
      commit_message: Record root-lineage transfer classification [skip ci]
