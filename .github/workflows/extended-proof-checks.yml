name: Extended proof checks

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  full-exact-certificates:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify full exact certificate frontier
        run: bash src/run_verify_transport_reserve.sh
