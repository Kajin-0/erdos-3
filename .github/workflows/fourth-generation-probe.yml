name: Fourth-generation exact probe

on:
  push:
    branches:
      - main
    paths:
      - src/probe_fourth_generation_potential_frontier.py
      - src/summarize_fourth_generation_probe.py
      - src/verify_fourth_generation_potential_frontier.py
      - data/fourth_generation_potential_frontier_certificate_2026-07-13.txt
      - .github/workflows/fourth-generation-probe.yml

permissions:
  contents: write

jobs:
  probe:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run exact fourth-generation probe
        shell: bash
        run: |
          set +e
          python3 src/run_exact_python.py \
            src/probe_fourth_generation_potential_frontier.py \
            > /tmp/fourth_generation_probe.json \
            2> /tmp/fourth_generation_probe.err
          probe_status=$?
          summary_status=not_run
          verifier_status=not_run
          : > /tmp/fourth_generation_summary.err
          : > /tmp/fourth_generation_verifier.err
          if [[ "$probe_status" == "0" ]]; then
            cp /tmp/fourth_generation_probe.json \
              data/fourth_generation_potential_frontier_probe.json
            python3 src/summarize_fourth_generation_probe.py \
              /tmp/fourth_generation_probe.json \
              > /tmp/fourth_generation_summary.json \
              2> /tmp/fourth_generation_summary.err
            summary_status=$?
            if [[ "$summary_status" == "0" ]]; then
              cp /tmp/fourth_generation_summary.json \
                data/fourth_generation_potential_frontier_summary.json
            else
              rm -f data/fourth_generation_potential_frontier_summary.json
            fi
            python3 src/run_exact_python.py \
              src/verify_fourth_generation_potential_frontier.py \
              /tmp/fourth_generation_certificate.txt \
              > /tmp/fourth_generation_verifier.stdout \
              2> /tmp/fourth_generation_verifier.err
            verifier_status=$?
            if [[ "$verifier_status" == "0" ]]; then
              cmp data/fourth_generation_potential_frontier_certificate_2026-07-13.txt \
                /tmp/fourth_generation_certificate.txt
              verifier_status=$?
            fi
          else
            rm -f data/fourth_generation_potential_frontier_probe.json
            rm -f data/fourth_generation_potential_frontier_summary.json
          fi
          {
            echo "probe_exit_status=$probe_status"
            echo "summary_exit_status=$summary_status"
            echo "verifier_exit_status=$verifier_status"
            echo "commit=${GITHUB_SHA}"
            echo "--- probe stderr ---"
            cat /tmp/fourth_generation_probe.err
            echo "--- summary stderr ---"
            cat /tmp/fourth_generation_summary.err
            echo "--- verifier stderr ---"
            cat /tmp/fourth_generation_verifier.err
          } > data/fourth_generation_probe_status.txt
          exit 0

      - name: Commit deterministic probe output
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/fourth_generation_probe_status.txt
          git add -A data/fourth_generation_potential_frontier_probe.json
          git add -A data/fourth_generation_potential_frontier_summary.json
          if git diff --cached --quiet; then
            echo "No fourth-generation probe output change"
            exit 0
          fi
          git commit -m "Record fourth-generation exact probe result [skip ci]"
          git push
