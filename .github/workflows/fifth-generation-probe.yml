name: Fifth-generation exact probe

on:
  push:
    branches:
      - main
    paths:
      - src/probe_fifth_generation_feature_frontier.py
      - src/verify_fifth_generation_feature_frontier.py
      - data/fifth_generation_feature_frontier_certificate_2026-07-13.txt
      - .github/workflows/fifth-generation-probe.yml

permissions:
  contents: write

jobs:
  probe:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run and verify exact fifth-generation frontier
        shell: bash
        run: |
          set +e
          python3 src/run_exact_python.py \
            src/probe_fifth_generation_feature_frontier.py \
            > /tmp/fifth_generation_probe.json \
            2> /tmp/fifth_generation_probe.err
          probe_status=$?
          verifier_status=not_run
          : > /tmp/fifth_generation_verifier.err
          if [[ "$probe_status" == "0" ]]; then
            cp /tmp/fifth_generation_probe.json \
              data/fifth_generation_feature_frontier_probe.json
            python3 src/run_exact_python.py \
              src/verify_fifth_generation_feature_frontier.py \
              /tmp/fifth_generation_feature_frontier_certificate.txt \
              > /tmp/fifth_generation_verifier.stdout \
              2> /tmp/fifth_generation_verifier.err
            verifier_status=$?
            if [[ "$verifier_status" == "0" ]]; then
              cmp data/fifth_generation_feature_frontier_certificate_2026-07-13.txt \
                /tmp/fifth_generation_feature_frontier_certificate.txt
              verifier_status=$?
            fi
          else
            rm -f data/fifth_generation_feature_frontier_probe.json
          fi
          {
            echo "probe_exit_status=$probe_status"
            echo "verifier_exit_status=$verifier_status"
            echo "commit=${GITHUB_SHA}"
            echo "--- probe stderr ---"
            cat /tmp/fifth_generation_probe.err
            echo "--- verifier stderr ---"
            cat /tmp/fifth_generation_verifier.err
          } > data/fifth_generation_probe_status.txt
          exit 0

      - name: Commit deterministic fifth-generation result
        if: always()
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ ! -f data/fifth_generation_probe_status.txt ]]; then
            {
              echo "phase=workflow_failed_before_probe_status"
              echo "commit=${GITHUB_SHA}"
            } > data/fifth_generation_probe_status.txt
          fi
          git add data/fifth_generation_probe_status.txt
          git add -A data/fifth_generation_feature_frontier_probe.json
          if git diff --cached --quiet; then
            echo "No fifth-generation probe output change"
            exit 0
          fi
          git commit -m "Record fifth-generation exact probe result [skip ci]"
          git push