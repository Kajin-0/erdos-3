name: Lightweight proof checks

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  exact-small-certificates:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify exact lightweight certificates
        run: bash src/run_verify_ci_lightweight.sh
