name: Generation-aware feature probe

on:
  push:
    branches:
      - main
    paths:
      - src/probe_generation_aware_feature_profiles.py
      - src/summarize_generation_aware_feature_probe.py
      - src/probe_candidate_generation_potentials.py
      - src/verify_generation_aware_retained_potentials.py
      - src/patch_certainty_ledger_cl076.py
      - data/generation_aware_retained_potentials_certificate_2026-07-13.txt
      - .github/workflows/generation-feature-probe.yml

permissions:
  contents: write

jobs:
  probe:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run exact generation-aware feature probes
        shell: bash
        run: |
          set +e
          python3 src/run_exact_python.py \
            src/probe_generation_aware_feature_profiles.py \
            > /tmp/generation_feature_probe.json \
            2> /tmp/generation_feature_probe.err
          probe_status=$?
          summary_status=not_run
          candidate_status=not_run
          verifier_status=not_run
          patch_status=not_run
          : > /tmp/generation_feature_summary.err
          : > /tmp/candidate_generation_potentials.err
          : > /tmp/generation_potential_verifier.err
          : > /tmp/certainty_ledger_patch.err
          if [[ "$probe_status" == "0" ]]; then
            cp /tmp/generation_feature_probe.json \
              data/generation_aware_feature_profiles_probe.json
            python3 src/summarize_generation_aware_feature_probe.py \
              /tmp/generation_feature_probe.json \
              > /tmp/generation_feature_summary.json \
              2> /tmp/generation_feature_summary.err
            summary_status=$?
            if [[ "$summary_status" == "0" ]]; then
              cp /tmp/generation_feature_summary.json \
                data/generation_aware_feature_profiles_summary.json
            else
              rm -f data/generation_aware_feature_profiles_summary.json
            fi
            python3 src/run_exact_python.py \
              src/probe_candidate_generation_potentials.py \
              > /tmp/candidate_generation_potentials.json \
              2> /tmp/candidate_generation_potentials.err
            candidate_status=$?
            if [[ "$candidate_status" == "0" ]]; then
              cp /tmp/candidate_generation_potentials.json \
                data/candidate_generation_potentials_probe.json
            else
              rm -f data/candidate_generation_potentials_probe.json
            fi
            python3 src/run_exact_python.py \
              src/verify_generation_aware_retained_potentials.py \
              /tmp/generation_aware_retained_potentials_certificate.txt \
              > /tmp/generation_potential_verifier.stdout \
              2> /tmp/generation_potential_verifier.err
            verifier_status=$?
            if [[ "$verifier_status" == "0" ]]; then
              cmp data/generation_aware_retained_potentials_certificate_2026-07-13.txt \
                /tmp/generation_aware_retained_potentials_certificate.txt
              verifier_status=$?
            fi
            if [[ "$verifier_status" == "0" ]]; then
              python3 src/patch_certainty_ledger_cl076.py \
                2> /tmp/certainty_ledger_patch.err
              patch_status=$?
            fi
          else
            rm -f data/generation_aware_feature_profiles_probe.json
            rm -f data/generation_aware_feature_profiles_summary.json
            rm -f data/candidate_generation_potentials_probe.json
          fi
          {
            echo "probe_exit_status=$probe_status"
            echo "summary_exit_status=$summary_status"
            echo "candidate_exit_status=$candidate_status"
            echo "verifier_exit_status=$verifier_status"
            echo "patch_exit_status=$patch_status"
            echo "commit=${GITHUB_SHA}"
            echo "--- probe stderr ---"
            cat /tmp/generation_feature_probe.err
            echo "--- summary stderr ---"
            cat /tmp/generation_feature_summary.err
            echo "--- candidate stderr ---"
            cat /tmp/candidate_generation_potentials.err
            echo "--- verifier stderr ---"
            cat /tmp/generation_potential_verifier.err
            echo "--- patch stderr ---"
            cat /tmp/certainty_ledger_patch.err
          } > data/generation_aware_feature_probe_status.txt
          exit 0

      - name: Commit deterministic probe output
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/generation_aware_feature_probe_status.txt
          git add -A data/generation_aware_feature_profiles_probe.json
          git add -A data/generation_aware_feature_profiles_summary.json
          git add -A data/candidate_generation_potentials_probe.json
          git add docs/certainty-ledger.md
          if git diff --cached --quiet; then
            echo "No probe output change"
            exit 0
          fi
          git commit -m "Record generation-aware retained potential theorem [skip ci]"
          git push
