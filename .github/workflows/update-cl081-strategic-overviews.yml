name: Update CL-081 strategic overviews

on:
  push:
    branches:
      - main
    paths:
      - src/patch_cl081_strategic_overviews.py
      - .github/workflows/update-cl081-strategic-overviews.yml

permissions:
  contents: write

concurrency:
  group: probe-result-writers-main
  cancel-in-progress: false

jobs:
  update:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Patch strategic documents
        run: |
          python3 -m py_compile src/patch_cl081_strategic_overviews.py
          python3 src/patch_cl081_strategic_overviews.py

      - name: Commit strategic update
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs/comprehensive-research-landscape.md docs/branching-reserve-lp.md
          if git diff --cached --quiet; then
            echo "Strategic overviews already current"
            exit 0
          fi
          git commit -m "Update strategic overviews to CL-081 [skip ci]"
          git fetch origin main
          if ! git rebase origin/main; then
            git rebase --abort || true
            exit 1
          fi
          git push origin HEAD:main
