name: Five-generation feature LP

on:
  push:
    branches:
      - main
    paths:
      - src/probe_five_generation_feature_lp.py
      - .github/workflows/five-generation-feature-lp.yml

permissions:
  contents: write

jobs:
  solve:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Solve exact five-generation feature LP
        shell: bash
        run: |
          set +e
          echo "phase=started" > data/five_generation_feature_lp_status.txt
          echo "commit=${GITHUB_SHA}" >> data/five_generation_feature_lp_status.txt
          python3 src/run_exact_python.py \
            src/probe_five_generation_feature_lp.py \
            > /tmp/five_generation_feature_lp.json \
            2> /tmp/five_generation_feature_lp.err
          status=$?
          {
            echo "exit_status=$status"
            echo "phase=completed"
            echo "--- stderr ---"
            cat /tmp/five_generation_feature_lp.err
          } >> data/five_generation_feature_lp_status.txt
          if [[ "$status" == "0" ]]; then
            cp /tmp/five_generation_feature_lp.json data/five_generation_feature_lp_probe.json
          else
            rm -f data/five_generation_feature_lp_probe.json
          fi
          exit 0

      - name: Commit deterministic LP result
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ ! -f data/five_generation_feature_lp_status.txt ]]; then
            {
              echo "phase=workflow_failed_before_solver_status"
              echo "commit=${GITHUB_SHA}"
            } > data/five_generation_feature_lp_status.txt
          fi
          git add data/five_generation_feature_lp_status.txt
          git add -A data/five_generation_feature_lp_probe.json
          if git diff --cached --quiet; then
            echo "No five-generation feature LP output change"
            exit 0
          fi
          git commit -m "Record five-generation feature LP result [skip ci]"
          for attempt in 1 2 3; do
            git fetch origin main
            git rebase origin/main
            if git push origin HEAD:main; then
              exit 0
            fi
            sleep $((attempt * 2))
          done
          echo "error: failed to push after rebasing and three attempts" >&2
          exit 1
