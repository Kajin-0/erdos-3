name: Oriented full-edge pair persistence

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - src/probe_oriented_full_edge_pair_persistence.py
      - src/probe_oriented_full_edge_pair_persistence_v2.py
      - src/probe_oriented_full_edge_pair_persistence_v3.py
      - src/probe_oriented_full_edge_pair_persistence_v4.py
      - src/summarize_oriented_full_edge_pair_persistence.py
      - .github/workflows/oriented-full-edge-pair-persistence.yml

permissions:
  contents: write

concurrency:
  group: probe-result-writers-main
  cancel-in-progress: false

jobs:
  verify:
    uses: ./.github/workflows/reusable-python-probe-recorder.yml
    with:
      schema: oriented_full_edge_pair_persistence_probe_v4
      probe_script: src/probe_oriented_full_edge_pair_persistence_v4.py
      probe_output: data/oriented_full_edge_pair_persistence_probe.json
      summary_script: src/summarize_oriented_full_edge_pair_persistence.py
      summary_output: data/oriented_full_edge_pair_persistence_summary.txt
      status_output: data/oriented_full_edge_pair_persistence_status.txt
      commit_message: Record oriented pair persistence probe [skip ci]
