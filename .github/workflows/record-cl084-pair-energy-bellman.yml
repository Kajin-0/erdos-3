name: Record CL-084 pair-energy Bellman theorem

on:
  push:
    branches:
      - main
    paths:
      - src/patch_cl084_pair_energy_bellman.py
      - .github/workflows/record-cl084-pair-energy-bellman.yml

permissions:
  contents: write

concurrency:
  group: probe-result-writers-main
  cancel-in-progress: false

jobs:
  record:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Patch authoritative documents
        run: |
          python3 -m py_compile src/patch_cl084_pair_energy_bellman.py
          python3 src/patch_cl084_pair_energy_bellman.py
      - name: Commit update
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs/certainty-ledger.md docs/current-proof-program.md docs/research-decision-history.md
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "Record CL-084 pair-energy Bellman theorem [skip ci]"
          git fetch origin main
          if ! git rebase origin/main; then
            git rebase --abort || true
            exit 1
          fi
          git push origin HEAD:main
