name: Pair-resource R3-to-F4 diagnostic

on:
  push:
    branches:
      - main
    paths:
      - src/probe_pair_resource_third_to_fourth.py
      - src/summarize_pair_resource_third_to_fourth.py
      - src/verify_pair_resource_third_to_fourth.py
      - .github/workflows/pair-resource-third-to-fourth-probe.yml

permissions:
  contents: write

concurrency:
  group: probe-result-writers-main
  cancel-in-progress: false

jobs:
  probe:
    uses: ./.github/workflows/reusable-python-probe-recorder.yml
    with:
      schema: pair_resource_third_to_fourth_probe_v1
      probe_script: src/probe_pair_resource_third_to_fourth.py
      probe_output: data/pair_resource_third_to_fourth_probe.json
      summary_script: src/summarize_pair_resource_third_to_fourth.py
      summary_output: data/pair_resource_third_to_fourth_summary.txt
      status_output: data/pair_resource_third_to_fourth_status.txt
      verifier_script: src/verify_pair_resource_third_to_fourth.py
      certificate_output: data/pair_resource_third_to_fourth_certificate_2026-07-14.txt
      commit_message: Record R3-to-F4 pair-resource certificate [skip ci]
