name: Third-generation exact probe

on:
  push:
    branches:
      - main
    paths:
      - src/probe_third_generation_recursive_frontier.py
      - src/summarize_third_generation_probe.py
      - .github/workflows/third-generation-probe.yml

permissions:
  contents: write

jobs:
  probe:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run exact third-generation probe
        shell: bash
        run: |
          set +e
          python3 src/run_exact_python.py \
            src/probe_third_generation_recursive_frontier.py \
            > /tmp/third_generation_probe.json \
            2> /tmp/third_generation_probe.err
          probe_status=$?
          summary_status=not_run
          : > /tmp/third_generation_summary.err
          if [[ "$probe_status" == "0" ]]; then
            cp /tmp/third_generation_probe.json \
              data/third_generation_recursive_frontier_probe.json
            python3 src/summarize_third_generation_probe.py \
              /tmp/third_generation_probe.json \
              > /tmp/third_generation_summary.json \
              2> /tmp/third_generation_summary.err
            summary_status=$?
            if [[ "$summary_status" == "0" ]]; then
              cp /tmp/third_generation_summary.json \
                data/third_generation_recursive_frontier_summary.json
            else
              rm -f data/third_generation_recursive_frontier_summary.json
            fi
          else
            rm -f data/third_generation_recursive_frontier_probe.json
            rm -f data/third_generation_recursive_frontier_summary.json
          fi
          {
            echo "probe_exit_status=$probe_status"
            echo "summary_exit_status=$summary_status"
            echo "commit=${GITHUB_SHA}"
            echo "--- probe stderr ---"
            cat /tmp/third_generation_probe.err
            echo "--- summary stderr ---"
            cat /tmp/third_generation_summary.err
          } > data/third_generation_probe_status.txt
          exit 0

      - name: Commit deterministic probe output
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/third_generation_probe_status.txt
          if [[ -f data/third_generation_recursive_frontier_probe.json ]]; then
            git add data/third_generation_recursive_frontier_probe.json
          fi
          git add -A data/third_generation_recursive_frontier_summary.json
          if [[ -f data/third_generation_recursive_frontier_summary.json ]]; then
            git add data/third_generation_recursive_frontier_summary.json
          fi
          if git diff --cached --quiet; then
            echo "No probe output change"
            exit 0
          fi
          git commit -m "Record third-generation exact probe result [skip ci]"
          git push
