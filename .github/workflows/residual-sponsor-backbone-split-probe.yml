name: Residual-sponsor backbone split probe

on:
  push:
    branches:
      - main
    paths:
      - src/probe_residual_sponsor_backbone_split.py
      - src/summarize_residual_sponsor_backbone_split.py
      - .github/workflows/residual-sponsor-backbone-split-probe.yml

permissions:
  contents: write

jobs:
  probe:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run residual-sponsor split test
        run: |
          set +e
          python3 -m py_compile \
            src/probe_residual_sponsor_backbone_split.py \
            src/summarize_residual_sponsor_backbone_split.py
          compile_status=$?
          probe_status=not_run
          summary_status=not_run
          : > /tmp/residual_sponsor_backbone_split.err
          if [[ "$compile_status" == "0" ]]; then
            python3 src/run_exact_python.py \
              src/probe_residual_sponsor_backbone_split.py \
              > data/residual_sponsor_backbone_split_probe.json \
              2> /tmp/residual_sponsor_backbone_split.err
            probe_status=$?
            if [[ "$probe_status" == "0" ]]; then
              python3 src/summarize_residual_sponsor_backbone_split.py \
                data/residual_sponsor_backbone_split_probe.json \
                data/residual_sponsor_backbone_split_summary.txt \
                2>> /tmp/residual_sponsor_backbone_split.err
              summary_status=$?
            else
              rm -f data/residual_sponsor_backbone_split_probe.json
              rm -f data/residual_sponsor_backbone_split_summary.txt
            fi
          fi
          {
            echo "compile_exit_status=$compile_status"
            echo "probe_exit_status=$probe_status"
            echo "summary_exit_status=$summary_status"
            echo "commit=${GITHUB_SHA}"
            echo "--- stderr ---"
            cat /tmp/residual_sponsor_backbone_split.err
          } > data/residual_sponsor_backbone_split_status.txt
          exit 0
      - name: Commit deterministic result
        if: always()
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/residual_sponsor_backbone_split_status.txt
          git add -A data/residual_sponsor_backbone_split_probe.json
          git add -A data/residual_sponsor_backbone_split_summary.txt
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "Record residual-sponsor backbone split probe [skip ci]"
          for attempt in 1 2 3; do
            git fetch origin main
            git rebase origin/main
            if git push origin HEAD:main; then exit 0; fi
            sleep $((attempt * 2))
          done
          exit 1
