name: Canonical scale-transfer documentation

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - src/run_scale_transfer_docs_patch.py
      - src/patch_cl089_cl092_frontier.py
      - src/patch_cl089_cl096_collision_frontier.py
      - src/patch_cl097_cl100_scale_transfer.py
      - .github/workflows/scale-transfer-docs-patch.yml

permissions:
  contents: write

concurrency:
  group: scale-transfer-docs-patch
  cancel-in-progress: false

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply patch and capture status
        shell: bash
        run: |
          set +e
          err="${RUNNER_TEMP}/scale_transfer_docs_patch.err"
          : > "$err"
          python3 -m py_compile \
            src/run_scale_transfer_docs_patch.py \
            src/patch_cl089_cl092_frontier.py \
            src/patch_cl089_cl096_collision_frontier.py \
            src/patch_cl097_cl100_scale_transfer.py \
            2>"$err"
          compile_status=$?
          patch_status=not_run
          if [[ "$compile_status" == "0" ]]; then
            python3 src/run_scale_transfer_docs_patch.py 2>>"$err"
            patch_status=$?
          fi
          {
            echo "schema=scale_transfer_docs_patch_status_v1"
            echo "compile_exit_status=$compile_status"
            echo "patch_exit_status=$patch_status"
            echo "source_commit=${GITHUB_SHA}"
            echo "workflow_run_id=${GITHUB_RUN_ID}"
            echo "--- stderr ---"
            cat "$err"
          } > data/scale_transfer_docs_patch_status.txt
          exit 0

      - name: Commit result
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          bash src/stage_optional_probe_outputs.sh data/scale_transfer_docs_patch_status.txt
          if grep -Fxq 'compile_exit_status=0' data/scale_transfer_docs_patch_status.txt && \
             grep -Fxq 'patch_exit_status=0' data/scale_transfer_docs_patch_status.txt; then
            git add -- README.md docs/certainty-ledger.md docs/current-proof-program.md docs/research-decision-history.md
          fi
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Record scale-transfer documentation [skip ci]"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Report patch failure
        if: always()
        shell: bash
        run: bash src/assert_probe_status.sh data/scale_transfer_docs_patch_status.txt
