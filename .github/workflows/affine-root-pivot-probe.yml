name: Affine root-pivot probe

on:
  push:
    branches:
      - main
    paths:
      - src/probe_affine_root_pivot.py
      - src/summarize_affine_root_pivot.py
      - .github/workflows/affine-root-pivot-probe.yml

permissions:
  contents: write

concurrency:
  group: probe-result-writers-main
  cancel-in-progress: false

jobs:
  probe:
    uses: ./.github/workflows/reusable-python-probe-recorder.yml
    with:
      schema: affine_root_pivot_probe_v1
      probe_script: src/probe_affine_root_pivot.py
      probe_output: data/affine_root_pivot_probe.json
      summary_script: src/summarize_affine_root_pivot.py
      summary_output: data/affine_root_pivot_summary.txt
      status_output: data/affine_root_pivot_status.txt
      commit_message: Record affine root-pivot probe [skip ci]
