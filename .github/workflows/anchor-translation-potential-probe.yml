name: Anchor-translation potential probe

on:
  push:
    branches:
      - main
    paths:
      - src/probe_anchor_translation_potential.py
      - src/summarize_anchor_translation_potential.py
      - .github/workflows/anchor-translation-potential-probe.yml

permissions:
  contents: write

concurrency:
  group: probe-result-writers-main
  cancel-in-progress: false

jobs:
  probe:
    uses: ./.github/workflows/reusable-python-probe-recorder.yml
    with:
      schema: anchor_translation_potential_probe_v1
      probe_script: src/probe_anchor_translation_potential.py
      probe_output: data/anchor_translation_potential_probe.json
      summary_script: src/summarize_anchor_translation_potential.py
      summary_output: data/anchor_translation_potential_summary.txt
      status_output: data/anchor_translation_potential_status.txt
      commit_message: Record anchor-translation potential probe [skip ci]
